<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Maria Bloom Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #4a4a4a;
            background: linear-gradient(135deg, #f8c8dc 0%, #e6d6f5 100%);
            min-height: 100vh;
        }
        :root {
            --primary-pink: #ff9aa2;
            --secondary-violet: #b19cd9;
            --deep-violet: #7b68ee;
            --white: #ffffff;
            --shadow: 0 15px 35px rgba(177, 156, 217, 0.3);
            --gradient: linear-gradient(135deg, var(--primary-pink), var(--secondary-violet));
        }

        .navbar {
            position: fixed; top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px); z-index: 1000;
            padding: 1rem 0; box-shadow: var(--shadow);
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 2rem;
        }
        .logo {
            font-family: 'Playfair Display', serif; font-size: 1.4rem;
            font-weight: 700; background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        #loginOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 3000; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .login-box {
            background: white; padding: 2.5rem; border-radius: 30px;
            text-align: center; width: 90%; max-width: 400px;
        }
        .login-input {
            width: 100%; padding: 12px; margin: 20px 0;
            border: 2px solid #eee; border-radius: 10px; font-family: inherit; text-align: center;
        }

        .hero { min-height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-top: 120px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .progress-section { background: white; padding: 2rem; text-align: center; margin: 20px auto; max-width: 900px; border-radius: 20px; box-shadow: var(--shadow); }
        .level-progress { background: #eee; height: 15px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .level-fill { height: 100%; background: var(--gradient); transition: 1s; }
        
        .level-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-box { background: #fdfbff; padding: 1rem; border-radius: 15px; border: 1px solid #eee; }
        .stat-number { font-size: 1.4rem; font-weight: bold; color: var(--deep-violet); }

        .games-grid { max-width: 1000px; margin: 2rem auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 0 20px; }
        .game-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: var(--shadow); text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { transform: translateY(-10px); border: 2px solid var(--primary-pink); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 25px; width: 100%; max-width: 500px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        .answer-options { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .answer-btn { width: 100%; padding: 12px; border: 2px solid #eee; background: white; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif; }
        .answer-btn.correct { background: #d4edda !important; border-color: #28a745 !important; }
        .answer-btn.incorrect { background: #f8d7da !important; border-color: #dc3545 !important; }
        
        .btn { background: var(--gradient); color: white; border: none; padding: 10px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="font-family: 'Playfair Display', serif;">Maria's Academy</h2>
            <p>Masukkan namamu untuk menyimpan progres:</p>
            <input type="text" id="userNameInput" class="login-input" placeholder="Namamu...">
            <button class="btn" onclick="userLogin()">Mulai</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">🌸 Maria Bloom</a>
            <div style="font-weight: bold;">⭐ <span id="navScore">0</span> pts</div>
        </div>
    </nav>

    <section class="hero">
        <h1>Maria Academy</h1>
        <p>Halo, <strong id="displayName">Player</strong>! Taklukkan semua kosa kata.</p>
    </section>

    <section class="progress-section">
        <h3 id="levelTextDisplay">Level 1: Novice</h3>
        <div class="level-progress">
            <div class="level-fill" id="progressBar"></div>
        </div>
        <div class="level-stats">
            <div class="stat-box"><div class="stat-number" id="statLevel">1</div>Level</div>
            <div class="stat-box"><div class="stat-number" id="statAcc">0%</div>Akurasi</div>
            <div class="stat-box"><div class="stat-number" id="statScore">0</div>Skor</div>
        </div>
    </section>

    <div class="games-grid">
        <div class="game-card" onclick="openQuiz(1)">
            <i class="fas fa-brain" style="color: var(--primary-pink); font-size: 2.5rem;"></i>
            <h3>Vocab Master</h3>
            <p>Level 1 - 3</p>
        </div>
        <div class="game-card" onclick="openQuiz(4)">
            <i class="fas fa-puzzle-piece" style="color: var(--secondary-violet); font-size: 2.5rem;"></i>
            <h3>Word Link</h3>
            <p>Level 4 - 6</p>
        </div>
        <div class="game-card" onclick="openQuiz(7)">
            <i class="fas fa-magic" style="color: var(--deep-violet); font-size: 2.5rem;"></i>
            <h3>Sentence Craft</h3>
            <p>Level 7 - 10</p>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div id="quizBody"></div>
            <button class="btn" style="margin-top: 20px; background:#888;" onclick="closeModal()">Tutup</button>
        </div>
    </div>

    <script>
        const allVocab = {
            1: [
                {w: "Ephemeral", d: "Tahan sebentar saja", s: "Transient"},
                {w: "Serendipity", d: "Penemuan kebetulan yang indah", s: "Luck"},
                {w: "Resilient", d: "Cepat pulih / tangguh", s: "Strong"},
                {w: "Luminous", d: "Bercahaya terang", s: "Bright"},
                {w: "Tenacious", d: "Gigih / tidak menyerah", s: "Stubborn"},
                {w: "Benevolent", d: "Baik hati & dermawan", s: "Kind"},
                {w: "Pragmatic", d: "Praktis / realistis", s: "Practical"}
            ],
            2: [
                {w: "Audacious", d: "Berani / nekat", s: "Bold"},
                {w: "Capricious", d: "Berubah-ubah / plin-plan", s: "Fickle"},
                {w: "Gregarious", d: "Suka bergaul", s: "Sociable"},
                {w: "Mitigate", d: "Meredakan / mengurangi", s: "Reduce"},
                {w: "Ubiquitous", d: "Ada di mana-mana", s: "Common"},
                {w: "Vibrant", d: "Penuh energi / hidup", s: "Lively"},
                {w: "Eloquent", d: "Fasih berbicara", s: "Articulate"}
            ],
            3: [
                {w: "Frugal", d: "Hemat / tidak boros", s: "Thrifty"},
                {w: "Inherent", d: "Sifat dasar / melekat", s: "Intrinsic"},
                {w: "Lucid", d: "Mudah dimengerti / jelas", s: "Clear"},
                {w: "Meticulous", d: "Sangat teliti", s: "Careful"},
                {w: "Novel", d: "Baru dan unik", s: "Original"},
                {w: "Obscure", d: "Samar / sulit dilihat", s: "Unclear"},
                {w: "Abstain", d: "Menjauhkan diri / puasa", s: "Refrain"}
            ],
            4: [
                {w: "Adversity", d: "Kemalangan / kesulitan", s: "Hardship"},
                {w: "Diligent", d: "Rajin / tekun", s: "Hardworking"},
                {w: "Empathy", d: "Kemampuan memahami perasaan", s: "Compassion"},
                {w: "Fortitude", d: "Ketabahan hati", s: "Brave"},
                {w: "Gullible", d: "Mudah ditipu / polos", s: "Naive"},
                {w: "Haughty", d: "Sombong / angkuh", s: "Proud"},
                {w: "Inevitable", d: "Pasti terjadi", s: "Unavoidable"}
            ],
            5: [
                {w: "Jubilant", d: "Sangat gembira", s: "Joyful"},
                {w: "Lethargic", d: "Lesu / tidak bertenaga", s: "Lazy"},
                {w: "Mundane", d: "Membosankan / biasa", s: "Dull"},
                {w: "Nonchalant", d: "Tenang / tidak peduli", s: "Cool"},
                {w: "Pensive", d: "Melamun / berpikir", s: "Thoughtful"},
                {w: "Quaint", d: "Unik / kuno menarik", s: "Charming"},
                {w: "Scrutinize", d: "Memeriksa dengan teliti", s: "Analyze"}
            ],
            6: [
                {w: "Tactful", d: "Sopan / penuh siasat", s: "Polite"},
                {w: "Venerable", d: "Dihormati karena usia", s: "Respected"},
                {w: "Wary", d: "Waspada / hati-hati", s: "Cautious"},
                {w: "Zeal", d: "Semangat membara", s: "Passion"},
                {w: "Affluence", d: "Kekayaan melimpah", s: "Wealth"},
                {w: "Candid", d: "Jujur / apa adanya", s: "Frank"},
                {w: "Disingenuous", d: "Tidak tulus / pura-pura", s: "Insincere"}
            ],
            7: [
                {w: "Enigma", d: "Misteri / teka-teki", s: "Mystery"},
                {w: "Facetious", d: "Bercanda di situasi serius", s: "Joking"},
                {w: "Garrulous", d: "Sangat cerewet", s: "Chatty"},
                {w: "Impeccable", d: "Sempurna tanpa cela", s: "Flawless"},
                {w: "Juxtapose", d: "Menjajajarkan untuk kontras", s: "Compare"},
                {w: "Mellifluous", d: "Suara merdu / manis", s: "Musical"},
                {w: "Nefarious", d: "Jahat / keji", s: "Evil"}
            ],
            8: [
                {w: "Obsequious", d: "Menjilat / terlalu patuh", s: "Servile"},
                {w: "Pellucid", d: "Sangat jernih / bening", s: "Clear"},
                {w: "Quixotic", d: "Idealistik tapi tidak nyata", s: "Dreamy"},
                {w: "Recalcitrant", d: "Sangat pembangkang", s: "Unruly"},
                {w: "Sycophant", d: "Penjilat demi keuntungan", s: "Flatterer"},
                {w: "Trenchant", d: "Tajam dan jelas", s: "Sharp"},
                {w: "Umbrage", d: "Rasa tersinggung", s: "Offense"}
            ],
            9: [
                {w: "Vicissitude", d: "Perubahan nasib", s: "Change"},
                {w: "Winsome", d: "Menawan / menarik", s: "Charming"},
                {w: "Xenophobia", d: "Ketakutan pada orang asing", s: "Prejudice"},
                {w: "Zenith", d: "Titik puncak / tertinggi", s: "Peak"},
                {w: "Amnesty", d: "Pengampunan resmi", s: "Pardon"},
                {w: "Brevity", d: "Keringkasan / singkat", s: "Shortness"},
                {w: "Condone", d: "Memaafkan kesalahan", s: "Excuse"}
            ],
            10: [
                {w: "Defenestration", d: "Melempar keluar jendela", s: "Expulsion"},
                {w: "Egregious", d: "Sangat buruk / mencolok", s: "Flagrant"},
                {w: "Floccinaucinihilipilification", d: "Menganggap sesuatu tidak berharga", s: "Belittling"},
                {w: "Inscrutable", d: "Sulit dipahami", s: "Mysterious"},
                {w: "Magnanimous", d: "Mulia / besar hati", s: "Noble"},
                {w: "Obfuscate", d: "Membuat bingung / kabur", s: "Confuse"},
                {w: "Sanguine", d: "Optimis / penuh harapan", s: "Hopeful"}
            ]
        };

        let currentUser = "";
        let data = { lvl: 1, score: 0, cor: 0, tot: 0 };
        const levelNames = ["Novice", "Beginner", "Intermediate", "Advanced", "Expert", "Master I", "Master II", "Professional", "Elite", "Legendary"];

        function userLogin() {
            const name = document.getElementById('userNameInput').value.trim();
            if(!name) return alert("Isi namamu!");
            currentUser = name.toLowerCase();
            document.getElementById('displayName').textContent = name;
            document.getElementById('loginOverlay').style.display = "none";
            const saved = localStorage.getItem('maria_user_' + currentUser);
            if(saved) data = JSON.parse(saved);
            updateUI();
        }

        function updateUI() {
            document.getElementById('statLevel').textContent = data.lvl;
            document.getElementById('statScore').textContent = data.score;
            document.getElementById('navScore').textContent = data.score;
            const acc = data.tot > 0 ? Math.round((data.cor / data.tot) * 100) : 0;
            document.getElementById('statAcc').textContent = acc + '%';
            document.getElementById('progressBar').style.width = (data.lvl * 10) + '%';
            document.getElementById('levelTextDisplay').textContent = `Level ${data.lvl}: ${levelNames[data.lvl-1]}`;
        }

        function openQuiz(startLvl) {
            // Memilih level kosa kata yang dimainkan (berdasarkan level user saat ini)
            const playLvl = data.lvl;
            const questions = allVocab[playLvl] || allVocab[1];
            const q = questions[Math.floor(Math.random() * questions.length)];
            
            // Mengacak pilihan jawaban
            const options = [q.w, "Magnificent", "Tough", "Pure", "Clever"].sort(() => Math.random() - 0.5);
            
            document.getElementById('quizBody').innerHTML = `
                <p style="color:var(--deep-violet); font-weight:bold;">Tantangan Level ${playLvl}</p>
                <h2 style="margin:20px 0;">"${q.d}"</h2>
                <div class="answer-options">
                    ${options.map(opt => `<button class="answer-btn" onclick="check('${opt}', '${q.w}')">${opt}</button>`).join('')}
                </div>
            `;
            document.getElementById('gameModal').classList.add('active');
        }

        function check(selected, correct) {
            data.tot++;
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(b => {
                b.disabled = true;
                if(b.textContent === correct) b.classList.add('correct');
                if(b.textContent === selected && selected !== correct) b.classList.add('incorrect');
            });

            if(selected === correct) {
                data.score += 20;
                data.cor++;
                if(data.lvl < 10) data.lvl++; // Naik level setiap jawaban benar untuk tes cepat
            }

            localStorage.setItem('maria_user_' + currentUser, JSON.stringify(data));
            updateUI();
            setTimeout(closeModal, 1500);
        }

        function closeModal() { document.getElementById('gameModal').classList.remove('active'); }
    </script>
</body>
</html>
